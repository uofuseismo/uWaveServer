name: prepare-environment
description: Prepares the environment
runs:
  using: "composite"
  steps:
    - name: Prepare environment
      run: |
        mkdir -p ${{github.workspace}}/build
        sudo apt-get update
        sudo apt-get install -y tar
        sudo apt-get install -y wget
        sudo apt-get install -y cmake
        sudo apt-get install -y buildah
        sudo apt-get install -y ninja-build
        sudo apt-get install -y clang
        sudo apt-get install -y clang-tidy
      shell: bash
      
    - uses: actions/cache@v5
      id: cache-libmseed-libslink      
      env:
        cache-name: cache-libmseed-libslink-modules
      with:
        path: /usr/local/
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('/usr/local/include/libmseed.h') }}-${{ hashFiles('/usr/local/include/libslink.h') }}
        
    - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
      name: Get libmseed/libslink
      run: |
        wget https://github.com/EarthScope/libmseed/archive/refs/tags/v3.3.0.tar.gz
        tar -xf v3.3.0.tar.gz
        rm v3.3.0.tar.gz
        cd libmseed-3.3.0
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DBUILD_STATIC_LIBS=ON -DBUILD_SHARED_LIBS=OFF
        cmake --build build
        sudo cmake --install build
        cd ../
        rm -rf libmseed-3.3.0 
        wget https://github.com/EarthScope/libslink/archive/refs/tags/v4.2.0.tar.gz
        tar -xf v4.2.0.tar.gz
        rm v4.2.0.tar.gz
        cd libslink-4.2.0
        CC=clang make
        sudo mv libslink.a /usr/local/lib
        sudo cp libslink.h /usr/local/include
        cd ../
        rm -rf libslink-4.2.0 
      shell: bash
          
